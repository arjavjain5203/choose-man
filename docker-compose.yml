services:
  backend:
    build:
      context: ./backend
    container_name: choose-man-backend
    environment:
      FRONTEND_BASE_URL: ${APP_ORIGIN:-http://localhost:8080}
      CORS_ORIGINS: ${APP_ORIGIN:-http://localhost:8080},http://127.0.0.1:${FRONTEND_PORT:-8080}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    container_name: choose-man-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
