services:
  backend:
    build:
      context: ./backend
    container_name: choose-man-backend
    environment:
      FRONTEND_BASE_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: choose-man-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
